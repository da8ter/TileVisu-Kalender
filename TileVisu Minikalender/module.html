<style>
    body { margin-bottom: 0; }
    .tvkal {
        --bg: var(--card-color);
        --card: var(--card-color);
        --text: var(--content-color);
        --muted: color-mix(in srgb, var(--content-color) 50%, transparent);
        --border: color-mix(in srgb, var(--accent-color) 30%, transparent);
        --accent: var(--accent-color);
        --radius: 14px;
        --gap: 12px;
        --nav-h: 44px;

        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: transparent;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
    }
    .tvkal *,
    .tvkal *::before,
    .tvkal *::after { box-sizing: border-box; }

    .tvkal__body {
        flex: 1 1 auto;
        min-height: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: calc(var(--gap) / 4);
        overflow: hidden;
    }

    .tvkal__view { display: none; flex: 1 1 auto; min-height: 0; flex-direction: column; }
    .tvkal__view.active { display: flex; }

    /* ── Listen-Ansicht ──────────────────────────────────────────────── */
    .tvkal__list {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: calc(var(--gap) / 4);
        overflow: auto;
        overscroll-behavior: contain;
        touch-action: pan-y;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: color-mix(in srgb, var(--accent) 70%, transparent) transparent;
    }
    .tvkal__list::-webkit-scrollbar { width: 6px; height: 6px; }
    .tvkal__list::-webkit-scrollbar-track { background: transparent; }
    .tvkal__list::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--accent) 70%, transparent);
        border-radius: 999px;
    }

    .tvkal__section-header {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--bg);
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        padding: 8px 4px 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
    }
    .tvkal__section-header .date {
        font-weight: 500;
        letter-spacing: normal;
        text-transform: none;
    }

    .tvkal__item {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: var(--gap);
        padding: calc(var(--gap) * 0.6) var(--gap);
        border-radius: var(--radius);
        background: var(--card);
        border: 1px solid var(--border);
    }
    .tvkal__item--clickable { cursor: pointer; transition: border-color .12s ease, transform .04s ease; }
    .tvkal__item--clickable:hover { border-color: var(--accent); }
    .tvkal__item--clickable:active { transform: scale(.99); }

    .tvkal__item--running {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 20%, var(--bg));
    }

    .tvkal__time {
        flex: 0 0 auto;
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        min-width: 84px;
    }
    .tvkal__item--running .tvkal__time { color: var(--text); }

    .tvkal__content {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    .tvkal__title {
        font-weight: 700;
        font-size: 13px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .tvkal__info {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .tvkal__meta {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
    }
    .tvkal__badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--accent);
        color: var(--text);
        background: color-mix(in srgb, var(--accent) 20%, var(--bg));
        font-weight: 600;
        white-space: nowrap;
    }

    .tvkal__empty {
        color: var(--muted);
        padding: 10px;
        text-align: center;
        font-style: italic;
    }

    /* ── Monats-Ansicht ──────────────────────────────────────────────── */
    .tvkal__month {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .tvkal__month-nav {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 2px 4px;
    }
    .tvkal__month-nav-btn {
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        cursor: pointer;
        padding: 0;
        font: inherit;
        transition: border-color .12s ease, transform .04s ease;
    }
    .tvkal__month-nav-btn:hover { border-color: var(--accent); }
    .tvkal__month-nav-btn:active { transform: scale(.94); }
    .tvkal__month-nav-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .tvkal__month-nav-title {
        flex: 1 1 auto;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.3px;
    }
    .tvkal__month-grid {
        flex-shrink: 0;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        align-content: start;
    }
    .tvkal__month-weekday {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: center;
        padding: 4px 0 2px;
    }
    .tvkal__month-day {
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 500;
        border-radius: 10px;
        border: 1px solid transparent;
        color: var(--text);
        background: transparent;
        user-select: none;
        cursor: pointer;
        transition: transform .08s ease, border-color .12s ease;
    }
    .tvkal__month-day:hover { border-color: var(--border); }
    .tvkal__month-day--other { color: var(--muted); opacity: 0.35; }
    .tvkal__month-day--today {
        border-color: var(--accent);
        font-weight: 700;
    }
    .tvkal__month-day--has-events {
        background: color-mix(in srgb, var(--accent) 25%, var(--bg));
        border-color: var(--accent);
        color: var(--text);
        font-weight: 700;
    }
    .tvkal__month-day--has-events:hover { transform: scale(1.05); }
    .tvkal__month-day--today.tvkal__month-day--has-events {
        background: var(--accent);
    }
    .tvkal__month-day--selected {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
    }

    .tvkal__day-events {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: calc(var(--gap) / 4);
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: color-mix(in srgb, var(--accent) 70%, transparent) transparent;
        padding-top: 4px;
    }
    .tvkal__day-events::-webkit-scrollbar { width: 6px; }
    .tvkal__day-events::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--accent) 70%, transparent);
        border-radius: 999px;
    }
    .tvkal__day-events-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 4px 4px 2px;
    }

    /* ── Bottom-Nav ──────────────────────────────────────────────────── */
    .tvkal__nav {
        flex-shrink: 0;
        height: var(--nav-h);
        display: flex;
        background: var(--bg);
        border-top: 1px solid var(--border);
        position: relative;
        z-index: 10;
    }
    .tvkal__nav-tab {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: var(--muted);
        cursor: pointer;
        padding: 0;
        font: inherit;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        transition: color .15s;
    }
    .tvkal__nav-tab svg { width: 24px; height: 24px; fill: currentColor; }
    .tvkal__nav-tab.active { color: var(--accent); }
    .tvkal__nav-tab:active { opacity: .7; }

    /* ── Overlay (Detail & Tages-Termine) ────────────────────────────── */
    .tvkal__overlay {
        position: absolute;
        inset: 0;
        padding: 0;
        display: none;
        flex-direction: column;
        overflow: hidden;
        z-index: 1000;
        background: var(--bg);
    }
    .tvkal__overlay.open { display: flex; }
    .tvkal__overlay-card {
        background: var(--card);
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }
    .tvkal__overlay-body {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        padding: var(--gap);
        scrollbar-width: thin;
        scrollbar-color: color-mix(in srgb, var(--accent) 70%, transparent) transparent;
    }
    .tvkal__overlay-body::-webkit-scrollbar { width: 6px; height: 6px; }
    .tvkal__overlay-body::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--accent) 70%, transparent);
        border-radius: 999px;
    }
    .tvkal__dialog-title {
        font-weight: 700;
        font-size: 16px;
        overflow-wrap: anywhere;
    }
    .tvkal__dialog-when {
        color: var(--muted);
        font-size: 13px;
        margin-top: -4px;
    }
    .tvkal__field-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 4px;
    }
    .tvkal__field-value {
        font-size: 13px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
    }
    .tvkal__overlay-actions {
        display: flex;
        gap: 8px;
        background: var(--card);
        padding: 10px var(--gap) var(--gap);
        border-top: 1px solid var(--border);
        flex: 0 0 auto;
    }
    .tvkal__overlay-actions button {
        flex: 1;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 10px 12px;
        background: var(--card);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        transition: transform .04s ease, border-color .12s ease;
    }
    .tvkal__overlay-actions button:hover { border-color: var(--accent); }
    .tvkal__overlay-actions button:active { transform: scale(.98); }
    .tvkal__overlay-actions button.primary {
        border-color: var(--accent);
        background: var(--accent);
    }
</style>
<div class="tvkal" id="tvkal-root">

<script>
    (function () {
        const root        = document.getElementById('tvkal-root');
        const listEl      = document.getElementById('tvkal-list');
        const viewList    = document.getElementById('tvkal-view-list');
        const viewMonth   = document.getElementById('tvkal-view-month');
        const monthTitle  = document.getElementById('tvkal-month-title');
        const monthGrid   = document.getElementById('tvkal-month-grid');
        const monthPrev   = document.getElementById('tvkal-month-prev');
        const monthNext   = document.getElementById('tvkal-month-next');
        const dayEventsEl = document.getElementById('tvkal-day-events');
        const navList     = document.getElementById('tvkal-nav-list');
        const navMonth    = document.getElementById('tvkal-nav-month');
        const overlay     = document.getElementById('tvkal-overlay');

        let currentData = null;
        let runningInterval = null;
        let activeView = 'list';
        const monthState = { year: null, month: null, selectedDate: null };

        function escapeHtml(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function render(data) {
            if (!data || typeof data !== 'object') return;
            currentData = data;
            // Initial Monatsstate nur beim ersten Laden auf "heute" setzen
            if (monthState.year === null) {
                const info = data.monthInfo || {};
                monthState.year = info.year || new Date().getFullYear();
                monthState.month = info.month || (new Date().getMonth() + 1);
                monthState.selectedDate = info.today || null;
            }
            renderList();
            renderMonth();
            startRunningTicker();
        }

        function pad2(n) { return String(n).padStart(2, '0'); }
        function isoFromParts(y, m, d) { return y + '-' + pad2(m) + '-' + pad2(d); }

        function getEventDatesSet(year, month) {
            const monthStart = new Date(year, month - 1, 1);
            const monthEnd   = new Date(year, month, 1); // exklusiv
            const dates = new Set();
            (currentData.allEvents || []).forEach(ev => {
                const evFrom = new Date(ev.from * 1000);
                const evTo   = new Date(ev.to * 1000);
                if (evTo <= monthStart || evFrom >= monthEnd) return;
                const cur = new Date(Math.max(evFrom.getTime(), monthStart.getTime()));
                cur.setHours(0, 0, 0, 0);
                const last = new Date(Math.min(evTo.getTime() - 1, monthEnd.getTime() - 1));
                last.setHours(0, 0, 0, 0);
                while (cur <= last) {
                    dates.add(isoFromParts(cur.getFullYear(), cur.getMonth() + 1, cur.getDate()));
                    cur.setDate(cur.getDate() + 1);
                }
            });
            return dates;
        }

        function getEventsForDate(iso) {
            const [y, m, d] = iso.split('-').map(Number);
            const dayStart = new Date(y, m - 1, d, 0, 0, 0).getTime() / 1000;
            const dayEnd   = dayStart + 86400;
            return (currentData.allEvents || [])
                .filter(ev => ev.from < dayEnd && ev.to > dayStart)
                .sort((a, b) => {
                    if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
                    return a.from - b.from;
                });
        }

        // ── List view ───────────────────────────────────────────────────
        function renderList() {
            const labels = currentData.labels || {};
            const config = currentData.config || {};
            const days = Array.isArray(currentData.days) ? currentData.days : [];
            const totalEvents = days.reduce((n, d) => n + (d.events ? d.events.length : 0), 0);

            if (totalEvents === 0) {
                listEl.innerHTML = '<div class="tvkal__empty">' + escapeHtml(labels.noEvents || 'No events') + '</div>';
                return;
            }
            listEl.innerHTML = days.map(day => renderDay(day, labels, config)).join('');
            attachItemHandlers(config);
        }

        function renderDay(day, labels, config) {
            const events = day.events || [];
            if (events.length === 0) return '';
            return (
                '<div class="tvkal__section-header">' +
                    '<span>' + escapeHtml(day.label) + '</span>' +
                    '<span class="date">' + escapeHtml(day.dateShort) + '</span>' +
                '</div>' +
                events.map((e, idx) => renderEvent(e, idx, day, config)).join('')
            );
        }

        function renderEvent(e, idx, day, config) {
            const cls = ['tvkal__item'];
            if (config.showDescriptionPopup) cls.push('tvkal__item--clickable');
            if (config.highlightRunning && e.running) cls.push('tvkal__item--running');

            const hasLocation = config.showLocation && e.location;
            const runningBadge = (config.highlightRunning && e.running)
                ? '<div class="tvkal__meta"><span class="tvkal__badge">live</span></div>'
                : '';

            return (
                '<div class="' + cls.join(' ') + '" ' +
                'data-day="' + escapeHtml(day.date) + '" ' +
                'data-idx="' + idx + '" ' +
                'data-from="' + e.from + '" ' +
                'data-to="' + e.to + '">' +
                    '<div class="tvkal__time">' + escapeHtml(e.timeLabel) + '</div>' +
                    '<div class="tvkal__content">' +
                        '<div class="tvkal__title">' + escapeHtml(e.title) + '</div>' +
                        (hasLocation ? '<div class="tvkal__info">' + escapeHtml(e.location) + '</div>' : '') +
                    '</div>' +
                    runningBadge +
                '</div>'
            );
        }

        function attachItemHandlers(config) {
            if (!config.showDescriptionPopup) return;
            listEl.querySelectorAll('.tvkal__item--clickable').forEach(el => {
                el.addEventListener('click', () => {
                    const dayKey = el.getAttribute('data-day');
                    const idx = parseInt(el.getAttribute('data-idx'), 10);
                    const day = currentData.days.find(d => d.date === dayKey);
                    if (!day) return;
                    const ev = day.events[idx];
                    if (!ev) return;
                    openEventDialog(ev, day);
                });
            });
        }

        // ── Month view ──────────────────────────────────────────────────
        function renderMonth() {
            const labels = currentData.labels || {};
            const info = currentData.monthInfo || {};
            const months = labels.months || [];
            const weekdays = labels.weekdays || [];
            const year = monthState.year;
            const month = monthState.month;
            const todayIso = info.today || '';
            const eventDates = getEventDatesSet(year, month);

            monthTitle.textContent = (months[month - 1] || '') + ' ' + year;

            // Mo-So Reihenfolge (weekdays sind [So, Mo, Di, Mi, Do, Fr, Sa])
            const weekdayOrder = [1, 2, 3, 4, 5, 6, 0];
            const weekdayHeader = weekdayOrder.map(i =>
                '<div class="tvkal__month-weekday">' + escapeHtml(weekdays[i] || '') + '</div>'
            ).join('');

            const firstOfMonth = new Date(year, month - 1, 1);
            const jsDow = firstOfMonth.getDay(); // 0=Sun ... 6=Sat
            const offset = (jsDow + 6) % 7;      // Montag-basiert
            const daysInMonth = new Date(year, month, 0).getDate();
            const prevMonthDays = new Date(year, month - 1, 0).getDate();

            let cells = '';
            for (let i = offset - 1; i >= 0; i--) {
                const d = prevMonthDays - i;
                cells += '<div class="tvkal__month-day tvkal__month-day--other">' + d + '</div>';
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const iso = isoFromParts(year, month, d);
                const cls = ['tvkal__month-day'];
                if (eventDates.has(iso)) cls.push('tvkal__month-day--has-events');
                if (iso === todayIso) cls.push('tvkal__month-day--today');
                if (iso === monthState.selectedDate) cls.push('tvkal__month-day--selected');
                cells += '<div class="' + cls.join(' ') + '" data-date="' + iso + '">' + d + '</div>';
            }
            const totalSoFar = offset + daysInMonth;
            const trailing = (7 - (totalSoFar % 7)) % 7;
            for (let d = 1; d <= trailing; d++) {
                cells += '<div class="tvkal__month-day tvkal__month-day--other">' + d + '</div>';
            }

            monthGrid.innerHTML = weekdayHeader + cells;

            monthGrid.querySelectorAll('.tvkal__month-day[data-date]').forEach(el => {
                el.addEventListener('click', () => {
                    monthState.selectedDate = el.getAttribute('data-date');
                    renderMonth();
                });
            });

            renderDayEvents();
        }

        function renderDayEvents() {
            const labels = currentData.labels || {};
            const config = currentData.config || {};
            const iso = monthState.selectedDate;
            if (!iso) {
                dayEventsEl.innerHTML = '';
                return;
            }

            const [y, m, d] = iso.split('-').map(Number);
            const weekdaysLong = labels.weekdaysLong || labels.weekdays || [];
            const months = labels.months || [];
            const dayDate = new Date(y, m - 1, d);
            const weekday = weekdaysLong[dayDate.getDay()] || '';
            const todayIso = (currentData.monthInfo || {}).today;
            let title;
            if (iso === todayIso) {
                title = labels.today || weekday;
            } else {
                title = weekday + ', ' + d + '. ' + (months[m - 1] || '') + ' ' + y;
            }

            const events = getEventsForDate(iso);
            let body;
            if (events.length === 0) {
                body = '<div class="tvkal__empty">' + escapeHtml(labels.noEvents || 'No events') + '</div>';
            } else {
                body = events.map((ev, idx) => {
                    const cls = ['tvkal__item'];
                    if (config.showDescriptionPopup) cls.push('tvkal__item--clickable');
                    const hasLocation = config.showLocation && ev.location;
                    return (
                        '<div class="' + cls.join(' ') + '" data-day-ev-idx="' + idx + '">' +
                            '<div class="tvkal__time">' + escapeHtml(ev.timeLabel) + '</div>' +
                            '<div class="tvkal__content">' +
                                '<div class="tvkal__title">' + escapeHtml(ev.title) + '</div>' +
                                (hasLocation ? '<div class="tvkal__info">' + escapeHtml(ev.location) + '</div>' : '') +
                            '</div>' +
                        '</div>'
                    );
                }).join('');
            }

            dayEventsEl.innerHTML =
                '<div class="tvkal__day-events-title">' + escapeHtml(title) + '</div>' +
                body;

            if (config.showDescriptionPopup) {
                dayEventsEl.querySelectorAll('.tvkal__item--clickable').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.getAttribute('data-day-ev-idx'), 10);
                        const ev = events[idx];
                        if (ev) openEventDialog(ev, { label: title, dateShort: pad2(d) + '.' + pad2(m) + '.' });
                    });
                });
            }
        }

        function shiftMonth(delta) {
            let y = monthState.year;
            let m = monthState.month + delta;
            while (m < 1) { m += 12; y--; }
            while (m > 12) { m -= 12; y++; }
            monthState.year = y;
            monthState.month = m;
            // Auswahl beibehalten wenn sie in den neuen Monat passt, sonst 1. des Monats
            const sel = monthState.selectedDate;
            if (sel) {
                const [sy, sm] = sel.split('-').map(Number);
                if (sy !== y || sm !== m) {
                    monthState.selectedDate = isoFromParts(y, m, 1);
                }
            }
            renderMonth();
        }
        monthPrev.addEventListener('click', () => shiftMonth(-1));
        monthNext.addEventListener('click', () => shiftMonth(+1));

        // ── Running-Ticker ──────────────────────────────────────────────
        function startRunningTicker() {
            if (runningInterval) return;
            runningInterval = setInterval(updateRunning, 30000);
        }
        function updateRunning() {
            if (!currentData || !currentData.config || !currentData.config.highlightRunning) return;
            const now = Math.floor(Date.now() / 1000);
            listEl.querySelectorAll('.tvkal__item').forEach(el => {
                const from = parseInt(el.getAttribute('data-from'), 10);
                const to = parseInt(el.getAttribute('data-to'), 10);
                const isRunning = now >= from && now < to;
                el.classList.toggle('tvkal__item--running', isRunning);
            });
        }

        // ── Tab-Switching ───────────────────────────────────────────────
        function switchView(view) {
            activeView = view;
            viewList.classList.toggle('active', view === 'list');
            viewMonth.classList.toggle('active', view === 'month');
            navList.classList.toggle('active', view === 'list');
            navMonth.classList.toggle('active', view === 'month');
        }
        navList.addEventListener('click', () => switchView('list'));
        navMonth.addEventListener('click', () => switchView('month'));

        // ── Overlays ────────────────────────────────────────────────────
        function openEventDialog(ev, day) {
            const labels = currentData.labels || {};
            const whenText = day.label + ' · ' + day.dateShort + ' · ' + (ev.allDay ? labels.allDay : ev.timeLabel);

            const rows = [];
            if (ev.location)    rows.push({ label: labels.location,    value: ev.location });
            if (ev.description) rows.push({ label: labels.description, value: ev.description });
            if (ev.categories)  rows.push({ label: labels.categories,  value: ev.categories });

            const rowsHtml = rows.map(r =>
                '<div class="tvkal__field-label">' + escapeHtml(r.label) + '</div>' +
                '<div class="tvkal__field-value">' + escapeHtml(r.value) + '</div>'
            ).join('');

            overlay.innerHTML =
                '<div class="tvkal__overlay-card">' +
                    '<div class="tvkal__overlay-body">' +
                        '<div class="tvkal__dialog-title">' + escapeHtml(ev.title) + '</div>' +
                        '<div class="tvkal__dialog-when">' + escapeHtml(whenText) + '</div>' +
                        rowsHtml +
                    '</div>' +
                    '<div class="tvkal__overlay-actions">' +
                        '<button type="button" class="primary" data-action="close">' + escapeHtml(labels.close || 'Close') + '</button>' +
                    '</div>' +
                '</div>';
            overlay.classList.add('open');
            overlay.querySelector('[data-action="close"]').addEventListener('click', closeOverlay);
            overlay.addEventListener('click', onOverlayClick);
            document.addEventListener('keydown', onKey);
        }

        function onOverlayClick(e) {
            if (e.target === overlay) closeOverlay();
        }
        function onKey(e) {
            if (e.key === 'Escape') closeOverlay();
        }
        function closeOverlay() {
            overlay.classList.remove('open');
            overlay.innerHTML = '';
            overlay.removeEventListener('click', onOverlayClick);
            document.removeEventListener('keydown', onKey);
        }

        // ── Bootstrap ───────────────────────────────────────────────────
        window.handleMessage = function (data) { render(data); };
        if (window.__tvkalInitialData) {
            render(window.__tvkalInitialData);
            delete window.__tvkalInitialData;
        }
    })();
</script>
